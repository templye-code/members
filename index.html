<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temply | تسجيل دخول الأعضاء</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="temply-logo.png" alt="Temply Logo">
        </div>
        <h2>تسجيل دخول الأعضاء</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="member-id">رقم المعرف (ID)</label>
                <input type="text" id="member-id" placeholder="TMP-26-XXX-0000" required>
            </div>
            <div class="input-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">دخول</button>
        </form>
        <p class="footer-text">نظام إدارة أعضاء Temply &copy; 2026</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
